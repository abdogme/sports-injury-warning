<!doctype html>
<html lang="ar" dir="rtl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>تقييم الإصابات الرياضية</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Bebas+Neue&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--bg: #0a0e1a;
				--surface: #111827;
				--surface2: #1a2235;
				--border: #1e2d45;
				--primary: #00d4ff;
				--primary-dim: rgba(0, 212, 255, 0.12);
				--success: #10b981;
				--warning: #f59e0b;
				--danger: #ef4444;
				--pain-color: #f97316;
				--pain-dim: rgba(249, 115, 22, 0.12);
				--text: #f1f5f9;
				--text-muted: #64748b;
				--text-soft: #94a3b8;
			}
			* { box-sizing: border-box; margin: 0; padding: 0; }
			body {
				font-family: "Tajawal", sans-serif;
				background: var(--bg);
				color: var(--text);
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow-x: hidden;
				position: relative;
			}
			body::before {
				content: "";
				position: fixed;
				inset: 0;
				background-image:
					linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
					linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
				background-size: 50px 50px;
				pointer-events: none;
				z-index: 0;
			}
			body::after {
				content: "";
				position: fixed;
				width: 600px;
				height: 600px;
				background: radial-gradient(circle, rgba(0, 212, 255, 0.06) 0%, transparent 70%);
				top: -150px;
				right: -150px;
				pointer-events: none;
				z-index: 0;
			}
			.orb2 {
				position: fixed;
				width: 500px;
				height: 500px;
				background: radial-gradient(circle, rgba(249, 115, 22, 0.05) 0%, transparent 70%);
				bottom: -100px;
				left: -100px;
				pointer-events: none;
				z-index: 0;
			}
			.card {
				position: relative;
				z-index: 1;
				width: 94%;
				max-width: 520px;
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 24px;
				padding: 2.2rem 2rem;
				box-shadow:
					0 0 0 1px rgba(0, 212, 255, 0.05),
					0 25px 50px rgba(0, 0, 0, 0.6),
					inset 0 1px 0 rgba(255, 255, 255, 0.04);
				margin: 2rem auto;
			}
			.step { display: none; }
			.active {
				display: block;
				animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
			}
			@keyframes fadeUp {
				from { opacity: 0; transform: translateY(18px); }
				to { opacity: 1; transform: translateY(0); }
			}
			.header {
				text-align: center;
				margin-bottom: 2rem;
				padding-bottom: 1.5rem;
				border-bottom: 1px solid var(--border);
			}
			.header h1 {
				font-family: "Bebas Neue", sans-serif;
				font-size: 2rem;
				letter-spacing: 2px;
				color: var(--primary);
				text-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
				margin-bottom: 4px;
			}
			.header .subtitle {
				font-size: 1.15rem;
				color: var(--text-soft);
				font-weight: 500;
			}
			.header-tag {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				background: var(--primary-dim);
				border: 1px solid rgba(0, 212, 255, 0.2);
				color: var(--primary);
				font-size: 0.72rem;
				font-weight: 700;
				padding: 3px 10px;
				border-radius: 20px;
				margin-top: 8px;
				letter-spacing: 1px;
				text-transform: uppercase;
			}
			.header-tag::before {
				content: "";
				width: 6px;
				height: 6px;
				background: var(--primary);
				border-radius: 50%;
				box-shadow: 0 0 6px var(--primary);
				animation: pulse 2s infinite;
			}
			@keyframes pulse {
				0%, 100% { opacity: 1; }
				50% { opacity: 0.4; }
			}
			.section-label {
				font-size: 0.7rem;
				font-weight: 700;
				letter-spacing: 2px;
				text-transform: uppercase;
				color: var(--text-muted);
				margin-bottom: 1rem;
				margin-top: 1.4rem;
				display: flex;
				align-items: center;
				gap: 8px;
			}
			.section-label::after {
				content: "";
				flex: 1;
				height: 1px;
				background: var(--border);
			}
			.input-group { margin-bottom: 14px; }
			.row { display: flex; gap: 12px; }
			.flex-1 { flex: 1; }
			label {
				display: block;
				margin-bottom: 7px;
				font-weight: 600;
				color: var(--text-soft);
				font-size: 0.85rem;
			}
			input[type="text"],
			input[type="number"],
			select {
				width: 100%;
				padding: 11px 14px;
				background: var(--surface2);
				border: 1.5px solid var(--border);
				border-radius: 10px;
				color: var(--text);
				font-family: "Tajawal", sans-serif;
				font-size: 0.95rem;
				transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
				outline: none;
				-webkit-appearance: none;
			}
			input:focus, select:focus {
				border-color: var(--primary);
				box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
				background: #1e2d40;
			}
			select option { background: var(--surface2); }

			/* Range sliders */
			.range-wrapper {
				display: flex;
				align-items: center;
				gap: 12px;
			}
			input[type="range"] {
				flex: 1;
				-webkit-appearance: none;
				height: 4px;
				background: var(--border);
				border-radius: 4px;
				border: none;
				padding: 0;
				cursor: pointer;
			}
			input[type="range"]::-webkit-slider-thumb {
				-webkit-appearance: none;
				width: 20px;
				height: 20px;
				background: var(--primary);
				border-radius: 50%;
				box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
				cursor: pointer;
			}
			input[type="range"].pain-range::-webkit-slider-thumb {
				background: var(--pain-color);
				box-shadow: 0 0 12px rgba(249, 115, 22, 0.6);
			}
			input[type="range"]:focus { box-shadow: none; border: none; }
			.fatigue-value {
				min-width: 36px;
				height: 36px;
				background: var(--primary-dim);
				border: 1px solid rgba(0, 212, 255, 0.3);
				color: var(--primary);
				border-radius: 8px;
				display: flex;
				align-items: center;
				justify-content: center;
				font-weight: 800;
				font-size: 1rem;
			}
			.pain-level-value {
				min-width: 36px;
				height: 36px;
				background: var(--pain-dim);
				border: 1px solid rgba(249, 115, 22, 0.3);
				color: var(--pain-color);
				border-radius: 8px;
				display: flex;
				align-items: center;
				justify-content: center;
				font-weight: 800;
				font-size: 1rem;
			}

			/* Body location selector */
			.body-grid {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 8px;
				margin-top: 4px;
			}
			.body-btn {
				background: var(--surface2);
				border: 1.5px solid var(--border);
				border-radius: 10px;
				color: var(--text-soft);
				font-family: "Tajawal", sans-serif;
				font-size: 0.82rem;
				font-weight: 600;
				padding: 9px 6px;
				cursor: pointer;
				transition: all 0.2s;
				text-align: center;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 4px;
				user-select: none;
			}
			.body-btn .icon { font-size: 1.2rem; }
			.body-btn:hover {
				border-color: var(--pain-color);
				color: var(--pain-color);
				background: var(--pain-dim);
			}
			.body-btn.selected {
				border-color: var(--pain-color);
				color: var(--pain-color);
				background: var(--pain-dim);
				box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
			}
			.body-btn.selected .icon { filter: drop-shadow(0 0 4px var(--pain-color)); }

			/* Pain type selector */
			.pain-type-grid {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 8px;
				margin-top: 4px;
			}
			.pain-type-btn {
				background: var(--surface2);
				border: 1.5px solid var(--border);
				border-radius: 10px;
				color: var(--text-soft);
				font-family: "Tajawal", sans-serif;
				font-size: 0.82rem;
				font-weight: 600;
				padding: 10px 8px;
				cursor: pointer;
				transition: all 0.2s;
				text-align: center;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 4px;
				user-select: none;
			}
			.pain-type-btn .icon { font-size: 1.2rem; }
			.pain-type-btn:hover {
				border-color: var(--danger);
				color: var(--danger);
				background: rgba(239, 68, 68, 0.1);
			}
			.pain-type-btn.selected {
				border-color: var(--danger);
				color: var(--danger);
				background: rgba(239, 68, 68, 0.1);
				box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
			}

			/* Buttons */
			.btn-primary {
				width: 100%;
				padding: 15px;
				background: linear-gradient(135deg, #0ea5e9, #00d4ff);
				color: #0a0e1a;
				border: none;
				border-radius: 12px;
				font-family: "Tajawal", sans-serif;
				font-size: 1.05rem;
				font-weight: 800;
				cursor: pointer;
				margin-top: 1.5rem;
				transition: all 0.2s;
				box-shadow: 0 8px 24px rgba(0, 212, 255, 0.25);
			}
			.btn-primary:hover {
				transform: translateY(-2px);
				box-shadow: 0 12px 32px rgba(0, 212, 255, 0.35);
			}
			.btn-primary:active { transform: translateY(0); }
			.btn-secondary {
				width: 100%;
				padding: 13px;
				background: transparent;
				border: 1.5px solid var(--border);
				color: var(--text-soft);
				border-radius: 12px;
				font-family: "Tajawal", sans-serif;
				font-size: 0.95rem;
				font-weight: 600;
				cursor: pointer;
				margin-top: 10px;
				transition: all 0.2s;
			}
			.btn-secondary:hover {
				border-color: var(--primary);
				color: var(--primary);
				background: var(--primary-dim);
			}

			/* Step 2 loading */
			#step2 { text-align: center; padding: 2rem 0; }
			.loading-ring { width: 80px; height: 80px; margin: 0 auto 2rem; }
			.loading-ring svg { width: 100%; height: 100%; animation: rotate 2s linear infinite; }
			.loading-ring circle { fill: none; stroke-width: 4; stroke-linecap: round; }
			.loading-ring .track { stroke: var(--border); }
			.loading-ring .fill {
				stroke: var(--primary);
				stroke-dasharray: 200;
				stroke-dashoffset: 50;
				filter: drop-shadow(0 0 6px var(--primary));
				animation: dash 1.5s ease-in-out infinite;
			}
			@keyframes rotate { to { transform: rotate(360deg); } }
			@keyframes dash {
				0% { stroke-dashoffset: 200; }
				50% { stroke-dashoffset: 50; }
				100% { stroke-dashoffset: 200; }
			}
			.loading-text { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
			.loading-sub { font-size: 0.82rem; color: var(--text-muted); line-height: 2; }
			.loading-dots span {
				display: inline-block;
				width: 6px;
				height: 6px;
				background: var(--primary);
				border-radius: 50%;
				margin: 0 3px;
				animation: blink 1.4s infinite;
			}
			.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
			.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
			@keyframes blink {
				0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
				40% { opacity: 1; transform: scale(1.2); }
			}

			/* Step 3 results */
			#step3 { text-align: center; }
			#step3 h2 {
				font-family: "Bebas Neue", sans-serif;
				font-size: 1.6rem;
				letter-spacing: 2px;
				color: var(--text-soft);
				margin-bottom: 1.5rem;
			}
			.score-ring {
				position: relative;
				width: 140px;
				height: 140px;
				margin: 0 auto 1.5rem;
			}
			.score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
			.score-ring circle { fill: none; stroke-width: 8; stroke-linecap: round; }
			.score-ring .bg-circle { stroke: var(--border); }
			.score-ring .fg-circle {
				stroke-dasharray: 339.3;
				stroke-dashoffset: 339.3;
				transition: stroke-dashoffset 1.5s cubic-bezier(0.22, 1, 0.36, 1), stroke 0.5s;
			}
			.score-inner {
				position: absolute;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
			}
			.score-number {
				font-family: "Bebas Neue", sans-serif;
				font-size: 2.8rem;
				line-height: 1;
				color: var(--text);
			}
			.score-label {
				font-size: 0.65rem;
				letter-spacing: 1.5px;
				text-transform: uppercase;
				color: var(--text-muted);
				font-weight: 700;
			}
			.status-badge {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				padding: 8px 20px;
				border-radius: 30px;
				font-weight: 700;
				font-size: 0.9rem;
				margin-bottom: 1.5rem;
			}
			.status-badge .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
			.stats-row {
				display: flex;
				gap: 10px;
				margin-bottom: 1.5rem;
				flex-wrap: wrap;
			}
			.stat-pill {
				flex: 1;
				min-width: 60px;
				background: var(--surface2);
				border: 1px solid var(--border);
				border-radius: 10px;
				padding: 10px 8px;
				text-align: center;
			}
			.stat-pill .val { font-weight: 800; font-size: 1.1rem; color: var(--primary); }
			.stat-pill .val.pain-val { color: var(--pain-color); }
			.stat-pill .lbl { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
			.advice-box {
				background: var(--surface2);
				border: 1px solid var(--border);
				border-right: 3px solid var(--primary);
				border-radius: 14px;
				padding: 1.2rem 1.4rem;
				margin: 0 0 1.5rem;
				text-align: right;
				line-height: 1.9;
				font-size: 0.9rem;
				color: var(--text-soft);
			}
			.advice-box .intro {
				display: block;
				font-weight: 700;
				color: var(--text);
				margin-bottom: 0.6rem;
			}
			.advice-box ul { padding-right: 1.2rem; margin: 0; }
			.advice-box ul li { margin-bottom: 0.3rem; }

			/* Weekly training label */
			.train-unit-toggle {
				display: flex;
				gap: 6px;
				margin-bottom: 7px;
				align-items: center;
			}
			.unit-btn {
				background: var(--surface2);
				border: 1.5px solid var(--border);
				border-radius: 8px;
				color: var(--text-muted);
				font-family: "Tajawal", sans-serif;
				font-size: 0.75rem;
				font-weight: 700;
				padding: 3px 10px;
				cursor: pointer;
				transition: all 0.2s;
			}
			.unit-btn.active-unit {
				border-color: var(--primary);
				color: var(--primary);
				background: var(--primary-dim);
			}

			/* Selected tags summary */
			.selection-tags {
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
				margin-top: 8px;
			}
			.sel-tag {
				background: var(--pain-dim);
				border: 1px solid rgba(249, 115, 22, 0.25);
				color: var(--pain-color);
				border-radius: 20px;
				font-size: 0.72rem;
				font-weight: 700;
				padding: 3px 10px;
			}
			.sel-tag.type-tag {
				background: rgba(239, 68, 68, 0.1);
				border-color: rgba(239, 68, 68, 0.25);
				color: var(--danger);
			}
		</style>
	</head>
	<body>
		<div class="orb2"></div>
		<div class="card">
			<div id="step1" class="step active">
				<div class="header">
					<h1>Sports Injury Early Warning</h1>
					<p class="subtitle">نظام الإنذار المبكر للإصابات الرياضية</p>
				</div>

				<div class="section-label">البيانات الأساسية</div>
				<div class="input-group">
					<label>اسم اللاعب</label>
					<input type="text" id="name" placeholder="مثال: محمد علي" />
				</div>
				<div class="row">
					<div class="input-group flex-1">
						<label>العمر</label>
						<input type="number" id="age" placeholder="25" />
					</div>
					<div class="input-group flex-1">
						<label>الوزن (كجم)</label>
						<input type="number" id="weight" placeholder="75" />
					</div>
				</div>
				<div class="input-group">
					<label>نوع الرياضة</label>
					<input type="text" id="sport" placeholder="مثال: كرة القدم" />
				</div>

				<div class="section-label">مؤشرات الأداء</div>
				<div class="input-group">
					<div class="train-unit-toggle">
						<label style="margin:0">ساعات التدريب</label>
						<button class="unit-btn active-unit" id="unitWeekly" onclick="setUnit('weekly')">أسبوعياً</button>
						<button class="unit-btn" id="unitDaily" onclick="setUnit('daily')">يومياً</button>
					</div>
					<input type="number" id="trainHours" placeholder="مثال: 10 ساعات أسبوعياً" />
				</div>
				<div class="input-group">
					<label>ساعات النوم بالأمس</label>
					<input type="number" id="sleepHours" placeholder="7" />
				</div>
				<div class="input-group">
					<label>مستوى الإرهاق (1 – 10)</label>
					<div class="range-wrapper">
						<input type="range" id="fatigue" min="1" max="10" value="5" />
						<div class="fatigue-value" id="fatigueVal">5</div>
					</div>
				</div>

				<div class="section-label">الحالة الصحية</div>
				<div class="input-group">
					<label>هل تشعر بألم حالياً؟</label>
					<select id="hasPain">
						<option value="no">لا — لا يوجد ألم</option>
						<option value="yes">نعم — يوجد ألم</option>
					</select>
				</div>

				<!-- Pain details section -->
				<div id="painSection" style="display:none">
					<!-- Pain level bar -->
					<div class="input-group">
						<label>شدة الألم (1 – 10)</label>
						<div class="range-wrapper">
							<input type="range" id="painLevel" min="1" max="10" value="5" class="pain-range" />
							<div class="pain-level-value" id="painLevelVal">5</div>
						</div>
					</div>

					<!-- Pain location boxes -->
					<div class="input-group">
						<label>مكان الألم <span style="color:var(--text-muted);font-size:0.75rem">(يمكن اختيار أكثر من مكان)</span></label>
						<div class="body-grid">
							<button class="body-btn" data-location="الرأس" onclick="toggleLocation(this)">
								<span class="icon">🧠</span> الرأس
							</button>
							<button class="body-btn" data-location="الرقبة" onclick="toggleLocation(this)">
								<span class="icon">🔝</span> الرقبة
							</button>
							<button class="body-btn" data-location="الكتف الأيمن" onclick="toggleLocation(this)">
								<span class="icon">💪</span> كتف أيمن
							</button>
							<button class="body-btn" data-location="الكتف الأيسر" onclick="toggleLocation(this)">
								<span class="icon">💪</span> كتف أيسر
							</button>
							<button class="body-btn" data-location="الظهر العلوي" onclick="toggleLocation(this)">
								<span class="icon">🫁</span> ظهر علوي
							</button>
							<button class="body-btn" data-location="الظهر السفلي" onclick="toggleLocation(this)">
								<span class="icon">🦴</span> ظهر سفلي
							</button>
							<button class="body-btn" data-location="الذراع الأيمن" onclick="toggleLocation(this)">
								<span class="icon">🦾</span> ذراع أيمن
							</button>
							<button class="body-btn" data-location="الذراع الأيسر" onclick="toggleLocation(this)">
								<span class="icon">🦾</span> ذراع أيسر
							</button>
							<button class="body-btn" data-location="المعصم" onclick="toggleLocation(this)">
								<span class="icon">⌚</span> المعصم
							</button>
							<button class="body-btn" data-location="البطن" onclick="toggleLocation(this)">
								<span class="icon">🫃</span> البطن
							</button>
							<button class="body-btn" data-location="الورك الأيمن" onclick="toggleLocation(this)">
								<span class="icon">🦵</span> ورك أيمن
							</button>
							<button class="body-btn" data-location="الورك الأيسر" onclick="toggleLocation(this)">
								<span class="icon">🦵</span> ورك أيسر
							</button>
							<button class="body-btn" data-location="الركبة اليمنى" onclick="toggleLocation(this)">
								<span class="icon">🦿</span> ركبة يمنى
							</button>
							<button class="body-btn" data-location="الركبة اليسرى" onclick="toggleLocation(this)">
								<span class="icon">🦿</span> ركبة يسرى
							</button>
							<button class="body-btn" data-location="الكاحل" onclick="toggleLocation(this)">
								<span class="icon">🦶</span> الكاحل
							</button>
						</div>
						<div class="selection-tags" id="locationTags"></div>
					</div>

					<!-- Pain type -->
					<div class="input-group">
						<label>نوع الألم <span style="color:var(--text-muted);font-size:0.75rem">(يمكن اختيار أكثر من نوع)</span></label>
						<div class="pain-type-grid">
							<button class="pain-type-btn" data-type="حاد" data-pts="4" onclick="togglePainType(this)">
								<span class="icon">⚡</span> حاد ومفاجئ
							</button>
							<button class="pain-type-btn" data-type="مزمن" data-pts="2" onclick="togglePainType(this)">
								<span class="icon">🔄</span> مستمر ومزمن
							</button>
							<button class="pain-type-btn" data-type="حرقة" data-pts="3" onclick="togglePainType(this)">
								<span class="icon">🔥</span> حرقة أو وخز
							</button>
							<button class="pain-type-btn" data-type="تيبس" data-pts="1" onclick="togglePainType(this)">
								<span class="icon">🧊</span> تيبس وصلابة
							</button>
							<button class="pain-type-btn" data-type="نابض" data-pts="3" onclick="togglePainType(this)">
								<span class="icon">💓</span> نابض ومتقطع
							</button>
							<button class="pain-type-btn" data-type="ضغط" data-pts="2" onclick="togglePainType(this)">
								<span class="icon">🤜</span> ضغط وثقل
							</button>
						</div>
						<div class="selection-tags" id="painTypeTags"></div>
					</div>
				</div>

				<div class="input-group">
					<label>هل تعرضت لإصابة سابقة؟</label>
					<select id="prevInjury">
						<option value="no">لا — لا توجد إصابات سابقة</option>
						<option value="yes">نعم — توجد إصابات سابقة</option>
					</select>
				</div>
				<button class="btn-primary" onclick="processResult()">
					تحليل مستوى الخطر ←
				</button>
			</div>

			<div id="step2" class="step">
				<div class="loading-ring">
					<svg viewBox="0 0 120 120">
						<circle class="track" cx="60" cy="60" r="54" />
						<circle class="fill" cx="60" cy="60" r="54" />
					</svg>
				</div>
				<p class="loading-text">جاري تحليل البيانات</p>
				<p class="loading-sub">
					يتم معالجة المؤشرات الحيوية الخاصة بك<br />
					<span class="loading-dots"><span></span><span></span><span></span></span>
				</p>
			</div>

			<div id="step3" class="step">
				<h2>نتائج التقييم</h2>
				<div class="score-ring">
					<svg viewBox="0 0 120 120">
						<circle class="bg-circle" cx="60" cy="60" r="54" />
						<circle class="fg-circle" id="fgCircle" cx="60" cy="60" r="54" />
					</svg>
					<div class="score-inner">
						<span class="score-number" id="scoreNum">0</span>
						<span class="score-label">نقاط الخطر</span>
					</div>
				</div>
				<div id="resBadge" class="status-badge">
					<span class="dot" id="badgeDot"></span>
					<span id="badgeText">جاري التحديد...</span>
				</div>
				<div class="stats-row" id="statsRow"></div>
				<div class="advice-box" id="resAdvice"></div>
				<button class="btn-primary" onclick="location.reload()">تقييم جديد</button>
				<button class="btn-secondary" onclick="goBack()">↺ إعادة الإدخال</button>
			</div>
		</div>

		<script>
			let savedData = null;
			let trainingUnit = 'weekly'; // 'weekly' or 'daily'
			let selectedLocations = [];
			let selectedPainTypes = [];

			// Training unit toggle
			function setUnit(unit) {
				trainingUnit = unit;
				document.getElementById('unitWeekly').classList.toggle('active-unit', unit === 'weekly');
				document.getElementById('unitDaily').classList.toggle('active-unit', unit === 'daily');
				const ph = unit === 'weekly' ? 'مثال: 10 ساعات أسبوعياً' : 'مثال: 2 ساعات يومياً';
				document.getElementById('trainHours').placeholder = ph;
			}

			// Fatigue slider
			document.getElementById("fatigue").addEventListener("input", function () {
				document.getElementById("fatigueVal").textContent = this.value;
			});

			// Pain level slider
			document.getElementById("painLevel").addEventListener("input", function () {
				document.getElementById("painLevelVal").textContent = this.value;
			});

			// Pain toggle
			document.getElementById("hasPain").addEventListener("change", function () {
				document.getElementById("painSection").style.display =
					this.value === "yes" ? "block" : "none";
				if (this.value !== "yes") {
					selectedLocations = [];
					selectedPainTypes = [];
					document.querySelectorAll('.body-btn').forEach(b => b.classList.remove('selected'));
					document.querySelectorAll('.pain-type-btn').forEach(b => b.classList.remove('selected'));
					updateLocationTags();
					updatePainTypeTags();
				}
			});

			// Location multi-select
			function toggleLocation(btn) {
				const loc = btn.dataset.location;
				if (btn.classList.contains('selected')) {
					btn.classList.remove('selected');
					selectedLocations = selectedLocations.filter(l => l !== loc);
				} else {
					btn.classList.add('selected');
					selectedLocations.push(loc);
				}
				updateLocationTags();
			}

			function updateLocationTags() {
				const cont = document.getElementById('locationTags');
				cont.innerHTML = selectedLocations.map(l => `<span class="sel-tag">${l}</span>`).join('');
			}

			// Pain type multi-select
			function togglePainType(btn) {
				const type = btn.dataset.type;
				if (btn.classList.contains('selected')) {
					btn.classList.remove('selected');
					selectedPainTypes = selectedPainTypes.filter(t => t !== type);
				} else {
					btn.classList.add('selected');
					selectedPainTypes.push(type);
				}
				updatePainTypeTags();
			}

			function updatePainTypeTags() {
				const cont = document.getElementById('painTypeTags');
				cont.innerHTML = selectedPainTypes.map(t => `<span class="sel-tag type-tag">${t}</span>`).join('');
			}

			function showStep(id) {
				document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
				document.getElementById(id).classList.add("active");
			}

			function processResult() {
				const ageEl = document.getElementById("age");
				const weightEl = document.getElementById("weight");
				const sportEl = document.getElementById("sport");
				const trainEl = document.getElementById("trainHours");
				const sleepEl = document.getElementById("sleepHours");
				const hasPainVal = document.getElementById("hasPain").value;

				const required = [ageEl, weightEl, sportEl, trainEl, sleepEl];

				let firstEmpty = null;
				required.forEach(el => {
					if (!el.value.trim()) {
						el.style.borderColor = "#ef4444";
						el.style.boxShadow = "0 0 0 3px rgba(239,68,68,0.25)";
						if (!firstEmpty) firstEmpty = el;
					} else {
						el.style.borderColor = "";
						el.style.boxShadow = "";
					}
				});

				if (firstEmpty) {
					firstEmpty.focus();
					firstEmpty.scrollIntoView({ behavior: "smooth", block: "center" });
					return;
				}

				showStep("step2");
				setTimeout(calculateRisk, 1800);
			}

			function calculateRisk() {
				const hasPainVal = document.getElementById("hasPain").value;
				const rawTrain = parseFloat(document.getElementById("trainHours").value) || 0;
				// Convert to weekly hours for scoring
				const trainWeekly = trainingUnit === 'daily' ? rawTrain * 7 : rawTrain;

				savedData = {
					name: document.getElementById("name").value,
					age: document.getElementById("age").value,
					weight: document.getElementById("weight").value,
					sport: document.getElementById("sport").value,
					trainHours: document.getElementById("trainHours").value,
					trainingUnit: trainingUnit,
					sleepHours: document.getElementById("sleepHours").value,
					fatigue: document.getElementById("fatigue").value,
					hasPain: hasPainVal,
					painLevel: document.getElementById("painLevel").value,
					painLocations: [...selectedLocations],
					painTypes: [...selectedPainTypes],
					prevInjury: document.getElementById("prevInjury").value,
				};

				const sleep = parseFloat(document.getElementById("sleepHours").value) || 0;
				const fatigue = parseInt(document.getElementById("fatigue").value);
				const prevInjury = document.getElementById("prevInjury").value;
				const age = parseFloat(document.getElementById("age").value) || 0;
				const weight = parseFloat(document.getElementById("weight").value) || 0;
				const name = document.getElementById("name").value.trim() || "أيها الرياضي";
				const painLevel = hasPainVal === 'yes' ? parseInt(document.getElementById("painLevel").value) : 0;

				let score = 0;

				// Sleep scoring
				if (sleep < 5) score += 5;
				else if (sleep < 7) score += 2;

				// Weekly training scoring (adjusted for weekly hours)
				if (trainWeekly > 20) score += 4;
				else if (trainWeekly > 14) score += 3;
				else if (trainWeekly >= 7) score += 1;

				// Pain scoring
				if (hasPainVal === "yes") {
					// Pain level
					if (painLevel >= 8) score += 6;
					else if (painLevel >= 5) score += 3;
					else score += 1;

					// Pain location penalty (multiple locations = more risk)
					if (selectedLocations.length >= 3) score += 3;
					else if (selectedLocations.length === 2) score += 2;
					else if (selectedLocations.length === 1) score += 1;

					// Pain type penalty
					let typePts = 0;
					selectedPainTypes.forEach(type => {
						const btn = document.querySelector(`.pain-type-btn[data-type="${type}"]`);
						if (btn) typePts += parseInt(btn.dataset.pts || 0);
					});
					score += Math.min(typePts, 6); // cap type points at 6
				}

				// Fatigue
				if (fatigue >= 8) score += 4;
				else if (fatigue >= 5) score += 2;

				// Previous injury
				if (prevInjury === "yes") score += 3;
				if (age > 35) score += 1;
				if (weight > 90) score += 1;

				displayResult(score, name, sleep, rawTrain, fatigue, painLevel, hasPainVal);
			}

			function displayResult(score, name, sleep, train, fatigue, painLevel, hasPain) {
				const badge = document.getElementById("resBadge");
				const dot = document.getElementById("badgeDot");
				const badgeTxt = document.getElementById("badgeText");
				const advice = document.getElementById("resAdvice");
				const scoreEl = document.getElementById("scoreNum");
				const statsEl = document.getElementById("statsRow");
				const fg = document.getElementById("fgCircle");

				// Max possible score is now higher, scale to 30
				const maxScore = 30;
				const offset = 339.3 - (Math.min(score, maxScore) / maxScore) * 339.3;

				let color, badgeLabel, adviceHTML;
				if (score <= 7) {
					color = "#10b981";
					badgeLabel = "آمن — خطر منخفض";
					badge.style.cssText = "display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:30px;font-weight:700;font-size:0.9rem;margin-bottom:1.5rem;color:#10b981;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3)";
					adviceHTML = `<span class="intro">يا <strong>${name}</strong>، مؤشراتك جيدة. إليك بعض التوصيات:</span><ul><li>القيام بتمارين إحماء خفيفة قبل ممارسة النشاط البدني.</li><li>استخدام كمادات باردة على مكان الإصابة لتقليل الألم أو التورم.</li><li>الراحة لفترة قصيرة وتجنب الضغط على الجزء المصاب.</li></ul>`;
				} else if (score <= 16) {
					color = "#f59e0b";
					badgeLabel = "تحذير — خطر متوسط";
					badge.style.cssText = "display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:30px;font-weight:700;font-size:0.9rem;margin-bottom:1.5rem;color:#f59e0b;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3)";
					adviceHTML = `<span class="intro">يا <strong>${name}</strong>، جسمك يُظهر علامات إجهاد. إليك ما يجب فعله:</span><ul><li>التوقف عن النشاط البدني فور الشعور بالألم.</li><li>عمل كمادات باردة مع رفع الجزء المصاب إن أمكن.</li><li>أخذ قسط كافٍ من الراحة ومراجعة مختص إذا استمر الألم.</li></ul>`;
				} else {
					color = "#ef4444";
					badgeLabel = "خطر مرتفع جداً ⚠";
					badge.style.cssText = "display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:30px;font-weight:700;font-size:0.9rem;margin-bottom:1.5rem;color:#ef4444;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3)";
					adviceHTML = `<span class="intro">تحذير عاجل يا <strong>${name}</strong>! مؤشراتك تشير إلى احتمال إصابة مرتفع:</span><ul><li>التوقف التام عن الحركة وعدم محاولة استخدام الجزء المصاب.</li><li>تثبيت المنطقة المصابة ووضع كمادات باردة لتقليل التورم.</li><li>التوجه فورًا للطبيب أو لأقرب مركز طبي للحصول على العلاج المناسب.</li></ul>`;
				}

				fg.style.stroke = color;
				fg.style.filter = "drop-shadow(0 0 8px " + color + ")";
				dot.style.background = color;
				dot.style.boxShadow = "0 0 8px " + color;
				badgeTxt.textContent = badgeLabel;
				document.getElementById("resAdvice").style.borderRightColor = color;
				advice.innerHTML = adviceHTML;

				// Build stats pills
				const trainLabel = trainingUnit === 'weekly' ? 'التدريب/أسبوع' : 'التدريب/يوم';
				let statsHTML = `
					<div class="stat-pill"><div class="val">${sleep}h</div><div class="lbl">النوم</div></div>
					<div class="stat-pill"><div class="val">${train}h</div><div class="lbl">${trainLabel}</div></div>
					<div class="stat-pill"><div class="val">${fatigue}/10</div><div class="lbl">الإرهاق</div></div>`;
				if (hasPain === 'yes') {
					statsHTML += `<div class="stat-pill"><div class="val pain-val">${painLevel}/10</div><div class="lbl">الألم</div></div>`;
				}
				statsEl.innerHTML = statsHTML;

				showStep("step3");
				let cur = 0;
				const inc = Math.max(1, Math.ceil(score / 20));
				const t = setInterval(() => {
					cur = Math.min(cur + inc, score);
					scoreEl.textContent = cur;
					if (cur >= score) clearInterval(t);
				}, 50);
				setTimeout(() => { fg.style.strokeDashoffset = offset; }, 100);
			}

			function goBack() {
				if (!savedData) { location.reload(); return; }

				document.getElementById("name").value = savedData.name;
				document.getElementById("age").value = savedData.age;
				document.getElementById("weight").value = savedData.weight;
				document.getElementById("sport").value = savedData.sport;
				document.getElementById("trainHours").value = savedData.trainHours;
				document.getElementById("sleepHours").value = savedData.sleepHours;
				document.getElementById("fatigue").value = savedData.fatigue;
				document.getElementById("fatigueVal").textContent = savedData.fatigue;
				document.getElementById("hasPain").value = savedData.hasPain;
				document.getElementById("painLevel").value = savedData.painLevel;
				document.getElementById("painLevelVal").textContent = savedData.painLevel;
				document.getElementById("prevInjury").value = savedData.prevInjury;

				trainingUnit = savedData.trainingUnit || 'weekly';
				setUnit(trainingUnit);

				// Restore selections
				selectedLocations = [...(savedData.painLocations || [])];
				selectedPainTypes = [...(savedData.painTypes || [])];

				document.querySelectorAll('.body-btn').forEach(btn => {
					btn.classList.toggle('selected', selectedLocations.includes(btn.dataset.location));
				});
				document.querySelectorAll('.pain-type-btn').forEach(btn => {
					btn.classList.toggle('selected', selectedPainTypes.includes(btn.dataset.type));
				});
				updateLocationTags();
				updatePainTypeTags();

				document.getElementById("painSection").style.display =
					savedData.hasPain === "yes" ? "block" : "none";

				showStep("step1");
			}
		</script>
	</body>
</html>
